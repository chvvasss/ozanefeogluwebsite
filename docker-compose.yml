# Local development services (Faz 1+).
# App container yok — `make dev` host'ta çalışır (Vite HMR, php artisan serve).
# Bu compose sadece destek servislerini ayağa kaldırır.

services:
  mysql:
    image: mysql:8.4
    container_name: ozane_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-ozanefeoglu}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_520_ci
      - --innodb-buffer-pool-size=256M
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: valkey/valkey:8-alpine
    container_name: ozane_redis
    restart: unless-stopped
    command:
      - valkey-server
      - --appendonly
      - "yes"
      - --save
      - "60"
      - "1"
      - --maxmemory
      - "256mb"
      - --maxmemory-policy
      - "allkeys-lru"
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: ozane_meili
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:-development_master_key_change_me}
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meili_data:/meili_data
    ports:
      - "127.0.0.1:7700:7700"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    # Local SMTP catch-all + web UI (mail testleri için)
    image: axllent/mailpit:latest
    container_name: ozane_mailpit
    restart: unless-stopped
    environment:
      MP_MAX_MESSAGES: 5000
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    ports:
      - "127.0.0.1:1025:1025"   # SMTP
      - "127.0.0.1:8025:8025"   # Web UI

  # Optional: GlitchTip for error tracking (Faz 7'de aktif olabilir)
  # Kapatılı çünkü PostgreSQL ve Redis ayrı, ek RAM. İhtiyaç doğunca aç.
  # glitchtip:
  #   image: glitchtip/glitchtip:latest
  #   ...

volumes:
  mysql_data:
  redis_data:
  meili_data:
