<!doctype html>
<html lang="tr"><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
.btn,.icon-btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;height:2.25rem;padding-inline:1.1rem;font-family:var(--font-sans);font-size:.875rem;font-weight:500;letter-spacing:-0.01em;line-height:1;border-radius:2px;border:1px solid transparent;cursor:pointer;text-decoration:none;white-space:nowrap;transition:all .12s}
.btn{background:var(--ink);color:var(--paper-50);border-color:var(--ink)}
.btn--secondary{background:transparent;color:var(--ink);border-color:var(--rule-strong)}
.btn--danger{background:#883028;color:#fff;border-color:#883028}
.icon-btn{width:2rem;height:2rem;padding:0;background:transparent;color:var(--ink-muted);border-color:var(--rule-strong);font-family:var(--font-mono)}
.btn--sm{height:2rem;padding-inline:.75rem;font-size:.78rem}
.btn--lg{height:2.75rem;padding-inline:1.5rem;font-size:1rem}
.link-quiet{color:var(--ink-muted);text-decoration:none;border-bottom:1px solid transparent;padding-bottom:1px}
.link-quiet:hover{color:var(--ink);border-bottom-color:var(--ink)}
.row{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:14px}
.lbl{font-family:var(--font-mono);font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-subtle);margin-top:14px;display:block}
</style></head>
<body>
<div class="card" style="height:auto;">
  <p class="eyebrow">Buttons · single family</p>

  <span class="lbl">Primary / secondary / danger</span>
  <div class="row">
    <button class="btn">Yayımla</button>
    <button class="btn btn--secondary">Taslak kaydet</button>
    <button class="btn btn--danger">Sil</button>
    <a href="#" class="link-quiet">Tüm dispatch →</a>
  </div>

  <span class="lbl">Sizes</span>
  <div class="row">
    <button class="btn btn--sm">Küçük</button>
    <button class="btn">Varsayılan</button>
    <button class="btn btn--lg">Büyük</button>
    <button class="icon-btn" aria-label="menu">≡</button>
    <button class="icon-btn" aria-label="theme">◐</button>
  </div>
</div>
</body></html>
