<!doctype html>
<html lang="tr"><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
.row{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:14px}
.cc{background:#fffdf6;border:1px solid var(--rule);padding:18px 20px 16px;display:flex;flex-direction:column;gap:.7rem;border-radius:2px}
.cc--primary{border-color:var(--ink)}
.pmark{font-family:var(--font-mono);font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ink);align-self:flex-start;padding:.15rem .5rem;border:1px solid var(--ink);border-radius:1px}
.ctype{font-family:var(--font-mono);font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-muted)}
.handle{font-family:var(--font-mono);font-size:1rem;color:var(--ink);word-break:break-all}
.note{font-size:.82rem;line-height:1.55;color:var(--ink-muted)}
</style></head>
<body>
<div class="card" style="height:auto;">
  <p class="eyebrow">Channels · /iletişim · real-only</p>
  <div class="row">
    <div class="cc cc--primary">
      <span class="pmark">PRIMARY</span>
      <span class="ctype">E-posta · şifreli</span>
      <span class="handle">ozan@ozanefeoglu.com</span>
      <span class="note">PGP zorunlu. Tüm telli iletişim e-posta üzerinden başlar.</span>
    </div>
    <div class="cc">
      <span class="ctype">Signal</span>
      <span class="handle">@ozanefeoglu.42</span>
      <span class="note">Hassas görüşmeler için. Yanıt 24 saat içinde.</span>
    </div>
  </div>
</div>
</body></html>
