<!doctype html>
<html lang="tr"><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
.f{display:flex;gap:.6rem;padding:.9rem 1rem;border-radius:2px;border:1px solid var(--rule-strong);background:#fffdf6;font-size:.875rem;line-height:1.5;color:var(--ink);margin-top:10px}
.f--ok{border-color:#4a6b3a;color:#4a6b3a}
.f--er{border-color:#883028;color:#883028}
.disclosure{padding:1.1rem 1.2rem;border-left:2px solid var(--ink);background:var(--bg-muted);margin-top:14px}
.disclosure p{font-family:var(--font-sans);font-size:.92rem;line-height:1.7;color:var(--ink-muted)}
.disclosure strong{color:var(--ink);font-weight:600}
</style></head>
<body>
<div class="card" style="height:auto;">
  <p class="eyebrow">Flash &amp; disclosure</p>
  <div class="f f--ok">Yazı yayımlandı. RSS ve sitemap güncellendi.</div>
  <div class="f f--er">Form gönderilemedi. reCAPTCHA doğrulaması başarısız.</div>
  <div class="f">Taslak otomatik kaydedildi · 16:42</div>
  <div class="disclosure">
    <p><strong>Disclosure.</strong> Bu yazı için seyahat ve konaklama kendi imkânlarımla karşılandı; herhangi bir kuruluş tarafından sponsorluk verilmedi.</p>
  </div>
</div>
</body></html>
