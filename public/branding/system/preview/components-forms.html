<!doctype html>
<html lang="tr"><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
.field{display:flex;flex-direction:column;gap:.375rem;margin-top:14px}
.field-label{font-family:var(--font-mono);font-size:.68rem;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-subtle)}
.input{width:100%;padding:.7rem .875rem;font-family:var(--font-sans);font-size:1rem;line-height:1.3;background:#fffdf6;color:var(--ink);border:1px solid var(--rule-strong);border-radius:2px;box-sizing:border-box}
.input:focus{border-color:var(--ink);outline:2px solid var(--accent);outline-offset:2px}
textarea.input{font-family:var(--font-sans);min-height:74px;resize:vertical}
.field-hint{font-size:.78rem;color:var(--ink-subtle);line-height:1.4}
.field-error{font-size:.78rem;color:#883028;line-height:1.4}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:18px}
</style></head>
<body>
<div class="card" style="height:auto;">
  <p class="eyebrow">Forms · square inputs · mono labels</p>
  <div class="cols">
    <label class="field">
      <span class="field-label">Başlık</span>
      <input class="input" value="Hatay'da bir kahvenin tezgâhı">
      <span class="field-hint">SEO & arşiv başlığı.</span>
    </label>
    <label class="field">
      <span class="field-label">E-posta</span>
      <input class="input" placeholder="ad@alan.tr" aria-invalid="true" style="border-color:#883028">
      <span class="field-error">Geçersiz adres formatı.</span>
    </label>
  </div>
  <label class="field">
    <span class="field-label">Standfirst</span>
    <textarea class="input">Kasa makinesinin ses çıkarmadığı saatlerde, bir başka şehir kuruluyordu.</textarea>
  </label>
</div>
</body></html>
