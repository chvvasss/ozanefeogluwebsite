<!doctype html>
<html lang="tr"><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
.mg{font-family:var(--font-mono);font-size:.72rem;line-height:1.5;color:var(--ink-muted);margin-top:14px;max-width:240px}
.mg dt{text-transform:uppercase;letter-spacing:.18em;color:var(--ink-subtle);font-size:.66rem}
.mg dd{margin:.2rem 0 0;color:var(--ink);font-variant-numeric:tabular-nums}
.mg div{margin:0;padding:.9rem 0;border-top:1px solid var(--rule)}
.mg div:first-child{border-top:0;padding-top:0}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.kunye{display:grid;gap:.5rem;font-family:var(--font-mono);font-size:.72rem;border-top:1px solid var(--rule);padding-top:.9rem;margin-top:14px}
.kunye-row{display:grid;grid-template-columns:6.5rem 1fr;gap:.75rem}
.kunye-row dt{text-transform:uppercase;letter-spacing:.18em;color:var(--ink-muted)}
.kunye-row dd{color:var(--ink);font-variant-numeric:tabular-nums;margin:0}
</style></head>
<body>
<div class="card" style="height:auto;">
  <p class="eyebrow">Marginalia rail · künye list</p>
  <div class="cols">
    <dl class="mg">
      <div><dt>Yayım</dt><dd>2026-04-26</dd></div>
      <div><dt>Konum</dt><dd>Hatay</dd></div>
      <div><dt>Tür</dt><dd>Saha yazısı</dd></div>
      <div><dt>Okuma</dt><dd>14 dk</dd></div>
    </dl>
    <dl class="kunye">
      <div class="kunye-row"><dt>Sahip</dt><dd>Ozan Efeoğlu</dd></div>
      <div class="kunye-row"><dt>Künye</dt><dd>Yayıncı / muhabir</dd></div>
      <div class="kunye-row"><dt>Adres</dt><dd>İstanbul, TR</dd></div>
      <div class="kunye-row"><dt>Versiyon</dt><dd>v1.0 · 2026-04-26</dd></div>
    </dl>
  </div>
</div>
</body></html>
