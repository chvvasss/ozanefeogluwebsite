<!doctype html>
<html lang="tr"><head><meta charset="utf-8">
<title>Brand Palette — 3 Colors</title>
<link rel="stylesheet" href="_card.css">
<style>
.swatches { display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-top: 18px; }
.sw { padding: 14px 14px 16px; border:1px solid var(--rule); }
.chip { width:100%; height:78px; margin-bottom:10px; border:1px solid rgba(0,0,0,0.06); }
.sw .name { font-family:var(--font-display); font-weight:700; font-size:1.05rem; letter-spacing:-0.01em; }
.sw .hex { font-family: var(--font-mono); font-size:.72rem; color:var(--ink); margin-top:3px; letter-spacing:0.04em; }
.sw .role { font-family: var(--font-mono); font-size:.62rem; color:var(--ink-subtle); letter-spacing:0.18em; text-transform:uppercase; margin-top:4px; }
.note { font-family:var(--font-display); font-style:italic; color:var(--ink-muted); font-size:.92rem; max-width:54ch; margin-top:18px; line-height:1.55; }
</style></head>
<body>
<div class="card" style="height:auto;">
  <p class="eyebrow">Editorial Silence · v1.0</p>
  <div class="swatches">
    <div class="sw">
      <div class="chip" style="background:#141310;"></div>
      <div class="name">Ink</div>
      <div class="hex">#141310</div>
      <div class="role">Mürekkep</div>
    </div>
    <div class="sw" style="background:#141310; color:#faf9f5;">
      <div class="chip" style="background:#faf9f5;"></div>
      <div class="name" style="color:#faf9f5">Paper</div>
      <div class="hex" style="color:#faf9f5">#faf9f5</div>
      <div class="role" style="color:#d0cbbd">Kâğıt</div>
    </div>
    <div class="sw">
      <div class="chip" style="background:#b91c1c;"></div>
      <div class="name">Stamp</div>
      <div class="hex">#b91c1c</div>
      <div class="role">Censor's red</div>
    </div>
  </div>
  <p class="note">Üç renk, daha fazla değil. Saf siyah dijital bir yalandır; saf beyaz sterildir; kırmızı bir damgadan ibarettir — asla bir yüzeye yayılmaz.</p>
</div>
</body></html>
