<!doctype html>
<html lang="tr"><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
.row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:18px}
.tile{padding:14px;border:1px solid var(--rule);background:var(--paper-50)}
.box{height:54px;background:var(--ink);}
.lbl{font-family:var(--font-mono);font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-subtle);margin-top:10px}
.val{font-family:var(--font-mono);font-size:.7rem;color:var(--ink);margin-top:2px}
.note{font-family:var(--font-display);font-style:italic;color:var(--ink-muted);font-size:.92rem;margin-top:14px;line-height:1.5}
</style></head>
<body>
<div class="card" style="height:auto;">
  <p class="eyebrow">Radius · square corner paradigm</p>
  <div class="row">
    <div class="tile"><div class="box" style="border-radius:1px"></div><div class="lbl">--radius-xs</div><div class="val">1px</div></div>
    <div class="tile"><div class="box" style="border-radius:2px"></div><div class="lbl">--radius-sm</div><div class="val">2px · btn</div></div>
    <div class="tile"><div class="box" style="border-radius:4px"></div><div class="lbl">--radius-md</div><div class="val">4px · input max</div></div>
    <div class="tile"><div class="box" style="border-radius:8px"></div><div class="lbl">--radius-lg</div><div class="val">8px · rare</div></div>
  </div>
  <p class="note">Kare köşe paradigması. 4 px tavan — form input'ları için. Hiçbir kart, modal veya panel daha yumuşak değil.</p>
</div>
</body></html>
