<!doctype html>
<html lang="tr"><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
.list{margin-top:14px;display:grid;gap:8px}
.r{display:grid;grid-template-columns:170px 90px 1fr;gap:14px;align-items:center;padding:8px 0;border-bottom:1px solid var(--rule)}
.tok{font-family:var(--font-mono);font-size:.7rem;letter-spacing:.04em;color:var(--ink)}
.val{font-family:var(--font-mono);font-size:.7rem;color:var(--ink-muted);font-variant-numeric:tabular-nums}
.bar{height:14px;background:var(--ink)}
</style></head>
<body>
<div class="card" style="height:auto;">
  <p class="eyebrow">Editorial rhythm · fluid clamp()</p>
  <div class="list">
    <div class="r"><span class="tok">--space-row</span><span class="val">~16–24 px</span><span class="bar" style="width:24px"></span></div>
    <div class="r"><span class="tok">--page-pad</span><span class="val">16–48 px</span><span class="bar" style="width:48px"></span></div>
    <div class="r"><span class="tok">--gutter</span><span class="val">16–24 px</span><span class="bar" style="width:24px"></span></div>
    <div class="r"><span class="tok">--space-subsection</span><span class="val">32–56 px</span><span class="bar" style="width:90px"></span></div>
    <div class="r"><span class="tok">--space-section</span><span class="val">64–128 px</span><span class="bar" style="width:200px"></span></div>
  </div>
</div>
</body></html>
