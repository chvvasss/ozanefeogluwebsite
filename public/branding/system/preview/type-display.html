<!doctype html>
<html lang="tr"><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
.spec { display:grid; gap: 18px; margin-top: 18px; }
.row { display:grid; grid-template-columns: 110px 1fr; gap: 22px; align-items:baseline; padding-bottom: 14px; border-bottom: 1px solid var(--rule); }
.row:last-child { border-bottom:0; }
.lbl { font-family: var(--font-mono); font-size: .68rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-subtle); }
.spec h1.statu { font-family:var(--font-display); font-weight:700; font-variation-settings:"opsz" 144; font-size: 3.4rem; line-height:.98; letter-spacing:-0.04em; margin:0; }
.spec h2.edit  { font-family:var(--font-display); font-weight:700; font-variation-settings:"opsz" 72; font-size: 2.1rem; line-height:1.05; letter-spacing:-0.02em; margin:0; }
.spec h3.quiet { font-family:var(--font-display); font-weight:600; font-variation-settings:"opsz" 48; font-size: 1.35rem; line-height:1.2; letter-spacing:-0.01em; margin:0; }
</style></head>
<body>
<div class="card" style="height:auto;">
  <p class="eyebrow">Display · Source Serif 4 Variable</p>
  <div class="spec">
    <div class="row"><span class="lbl">Statuesque<br>opsz 144</span><h1 class="statu">Sahaya inmek</h1></div>
    <div class="row"><span class="lbl">Editorial<br>opsz 72</span><h2 class="edit">Tezgâhın altında</h2></div>
    <div class="row"><span class="lbl">Quiet<br>opsz 48</span><h3 class="quiet">Daha fazla saha yazısı</h3></div>
  </div>
</div>
</body></html>
