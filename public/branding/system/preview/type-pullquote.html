<!doctype html>
<html lang="tr"><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
.pq {
  font-family: var(--font-display); font-style:italic; font-weight:400;
  font-variation-settings:"opsz" 96; font-size: 1.65rem; line-height: 1.3;
  letter-spacing:-0.01em; color:var(--ink);
  padding-left: 18px; border-left: 3px solid var(--accent);
  margin: 16px 0 0; max-width: 36ch;
}
.pq cite { display:block; margin-top: 12px; font-family: var(--font-mono);
  font-size:.68rem; font-style:normal; letter-spacing:.18em; text-transform:uppercase;
  color: var(--ink-subtle); }
</style></head>
<body>
<div class="card" style="height:auto;">
  <p class="eyebrow">Pull quote · brass indent · 1 per page max</p>
  <blockquote class="pq">
    Gazetecilik parlamaz, kazınır. Onaylanan satır, sessizce vurulan damgadır.
    <cite>Editorial Silence — Marka Notu</cite>
  </blockquote>
</div>
</body></html>
