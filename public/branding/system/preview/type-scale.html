<!doctype html>
<html lang="tr"><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
.scale { display:grid; gap: 6px; margin-top: 14px; }
.row { display:grid; grid-template-columns: 80px 64px 1fr; gap: 16px; align-items:baseline; padding: 4px 0; border-bottom: 1px solid var(--rule); }
.tok { font-family: var(--font-mono); font-size:.66rem; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-subtle); }
.size { font-family: var(--font-mono); font-size:.66rem; color:var(--ink-muted); font-variant-numeric: tabular-nums; }
.smp { font-family: var(--font-display); color:var(--ink); line-height:1; }
</style></head>
<body>
<div class="card" style="height:auto;">
  <p class="eyebrow">Modular scale · ratio 1.2</p>
  <div class="scale">
    <div class="row"><span class="tok">8xl</span><span class="size">5.83 rem</span><span class="smp" style="font-size:2.6rem">Aa</span></div>
    <div class="row"><span class="tok">6xl</span><span class="size">4.05 rem</span><span class="smp" style="font-size:2rem">Aa</span></div>
    <div class="row"><span class="tok">4xl</span><span class="size">2.81 rem</span><span class="smp" style="font-size:1.6rem">Aa</span></div>
    <div class="row"><span class="tok">2xl</span><span class="size">1.95 rem</span><span class="smp" style="font-size:1.3rem">Aa</span></div>
    <div class="row"><span class="tok">xl</span><span class="size">1.62 rem</span><span class="smp" style="font-size:1.15rem">Aa</span></div>
    <div class="row"><span class="tok">lg</span><span class="size">1.35 rem</span><span class="smp" style="font-size:1.05rem">Aa</span></div>
    <div class="row"><span class="tok">md</span><span class="size">1.125 rem</span><span class="smp" style="font-size:.95rem">Aa</span></div>
    <div class="row"><span class="tok">base</span><span class="size">1.0 rem</span><span class="smp" style="font-size:.88rem">Aa</span></div>
    <div class="row"><span class="tok">sm</span><span class="size">0.875 rem</span><span class="smp" style="font-size:.78rem">Aa</span></div>
    <div class="row"><span class="tok">xs</span><span class="size">0.78 rem</span><span class="smp" style="font-size:.7rem">Aa</span></div>
  </div>
</div>
</body></html>
